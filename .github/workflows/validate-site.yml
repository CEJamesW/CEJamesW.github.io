name: Validate site

on:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/check-site.mjs"
      - ".github/workflows/validate-site.yml"
      - ".nojekyll"
      - "404.html"
      - "CNAME"
      - "assets/home/**"
      - "css/home.css"
      - "img/icon/**"
      - "index.html"
      - "js/home.js"
      - "robots.txt"
      - "site.webmanifest"
      - "sitemap.xml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/check-site.mjs"
      - ".github/workflows/validate-site.yml"
      - ".nojekyll"
      - "404.html"
      - "CNAME"
      - "assets/home/**"
      - "css/home.css"
      - "img/icon/**"
      - "index.html"
      - "js/home.js"
      - "robots.txt"
      - "site.webmanifest"
      - "sitemap.xml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: node --check js/home.js

      - name: Check site integrity
        run: node .github/scripts/check-site.mjs

      - name: Validate HTML
        run: >-
          npx --yes --package=html-validate@11.5.6 html-validate
          --rule=doctype-style:off --rule=void-style:off
          index.html 404.html
