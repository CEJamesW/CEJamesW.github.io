<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CEJamesW/gaokao-admission-console · GitHub Snapshot</title>
  <style>
    :root {
      --border: #d0d7de;
      --muted: #57606a;
      --link: #0969da;
      --ink: #24292f;
      --panel: #ffffff;
      --soft: #f6f8fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #ffffff;
      font-family: "Microsoft YaHei UI", "Noto Sans CJK SC", sans-serif;
    }

    header {
      padding: 18px 32px;
      color: #f0f6fc;
      background: #0d1117;
      font-weight: 700;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 80px;
    }

    .repo-title {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 28px;
    }

    .repo-title strong {
      color: var(--link);
      font-weight: 800;
    }

    .desc {
      margin: 0 0 22px;
      font-size: 17px;
      color: var(--muted);
    }

    .panel {
      margin-top: 22px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--soft);
      font-weight: 700;
    }

    .panel img {
      display: block;
      width: 100%;
      height: auto;
    }

    .notes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 22px;
    }

    .notes div {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--soft);
    }

    .notes b {
      display: block;
      margin-bottom: 7px;
    }

    code {
      padding: 0.18em 0.38em;
      border-radius: 6px;
      background: rgba(175, 184, 193, 0.2);
      font-family: Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }
  </style>
</head>
<body>
  <header>GitHub Repository Snapshot</header>
  <main>
    <div class="repo-title"><b>CEJamesW</b><span>/</span><strong>gaokao-admission-console</strong></div>
    <p class="desc">Java高级编程与应用大作业 高考志愿填报管理系统</p>

    <section class="panel">
      <div class="panel-head"><span>Repository Overview</span><span>CEJamesW/gaokao-admission-console</span></div>
      <img src="../assets/collaboration/总览.png" alt="GitHub 仓库总览截图">
    </section>

    <section class="panel">
      <div class="panel-head"><span>README</span><span>项目说明</span></div>
      <img src="../assets/collaboration/readme快照.png" alt="README 快照截图">
    </section>

    <section class="notes">
      <div><b>Language</b><span><code>Java</code></span></div>
      <div><b>Build</b><span><code>Maven</code></span></div>
      <div><b>Database</b><span><code>SQLite</code></span></div>
      <div><b>App</b><span><code>Console</code></span></div>
    </section>
  </main>
</body>
</html>
